[build]
# command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# --- Security Headers ---
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://www.youtube.com https://s.ytimg.com https://apis.google.com https://accounts.google.com; frame-src https://www.youtube.com https://youtube.com https://accounts.google.com; img-src 'self' data: https://i.ytimg.com https://yt3.ggpht.com https://*.googleusercontent.com https://*.ggpht.com https:; style-src 'self' 'unsafe-inline'; connect-src 'self' https://corsproxy.io https://*.invidious.* https://*.netlify.app https://*.netlify.com https://generativelanguage.googleapis.com; font-src 'self'; media-src blob: https://www.youtube.com;"
