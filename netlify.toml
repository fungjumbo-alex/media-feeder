[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  external_node_modules = ["youtube-transcript-api"]

[[redirects]]
  from = "/api/transcript"
  to = "/.netlify/functions/transcript"
  status = 200



[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
